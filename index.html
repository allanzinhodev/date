<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visão de Date Comigo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff4b4b;
            --whatsapp-color: #25D366;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            /* Fallback background in case image is missing */
            background-color: #1a1a2e;
            /* Background image with overlay */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            overflow: hidden;
        }

        .container {
            background: transparent;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: all 0.4s ease;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 30px;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            line-height: 1.2;
        }

        .btn-accept {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 75, 75, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .btn-accept::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn-accept:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 75, 75, 0.6);
        }

        .btn-accept:hover::before {
            left: 100%;
        }

        .share-section {
            display: none;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .share-section.active {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }

        .share-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .btn-share {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-whatsapp {
            background-color: var(--whatsapp-color);
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            background-color: #20b858;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }

        .icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        
        #initial-content {
            transition: all 0.4s ease;
        }
        
        .hidden {
            display: none !important;
        }

        /* Floating Hearts Animation */
        .hearts-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .heart {
            position: absolute;
            bottom: -10vh;
            transform: scale(0);
            animation: floatUp 4s ease-in infinite;
        }
        
        @keyframes floatUp {
            0% { transform: scale(0) translateY(0) rotate(0deg); opacity: 0; }
            10% { transform: scale(1) translateY(-10vh) rotate(15deg); opacity: 1; }
            100% { transform: scale(0.5) translateY(-100vh) rotate(-15deg); opacity: 0; }
        }

        .footer-title {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="hearts-container" id="hearts"></div>

    <div class="container" id="card">
        <div id="initial-content">
            <h1>Você topa um jantar hoje e depois forró?</h1>
            <button class="btn-accept" id="acceptBtn">Eu topo!</button>
        </div>

        <div class="share-section" id="shareSection">
            <div class="share-title">Uhuul! Compartilhe a resposta:</div>
            
            <a href="#" target="_blank" class="btn-share btn-whatsapp" id="whatsappShare">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-3.825 3.113-6.937 6.937-6.937 1.856.001 3.598.723 4.907 2.034 1.31 1.311 2.031 3.054 2.03 4.908-.001 3.825-3.113 6.938-6.937 6.938z"/>
                </svg>
                WhatsApp
            </a>
        </div>
    </div>

    <div class="footer-title">Visão de Date Comigo</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const acceptBtn = document.getElementById('acceptBtn');
            const initialContent = document.getElementById('initial-content');
            const shareSection = document.getElementById('shareSection');
            const whatsappShare = document.getElementById('whatsappShare');
            
            // Configurar link do WhatsApp
            const phone = '5579998745753';
            const message = 'bora! qual o plano?';
            const encodedMessage = encodeURIComponent(message);
            whatsappShare.href = `https://wa.me/${phone}?text=${encodedMessage}`;

            // Ação do botão Aceitar
            acceptBtn.addEventListener('click', () => {
                // Efeito visual
                initialContent.style.opacity = '0';
                initialContent.style.transform = 'scale(0.9)';
                
                setTimeout(() => {
                    initialContent.classList.add('hidden');
                    shareSection.classList.add('active');
                    createHearts();
                }, 400);
            });

            // Função para criar corações flutuantes
            function createHearts() {
                const container = document.getElementById('hearts');
                const colors = ['#ff4b4b', '#ff7676', '#ff2a2a', '#ffffff'];
                
                for(let i = 0; i < 20; i++) {
                    setTimeout(() => {
                        const heart = document.createElement('div');
                        heart.innerHTML = '<svg viewBox="0 0 24 24" style="width: 30px; height: 30px; fill: ' + colors[Math.floor(Math.random() * colors.length)] + '; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));"><path d="M12 4.248c-3.148-5.402-12-3.825-12 2.944 0 4.661 5.571 9.427 12 15.808 6.43-6.381 12-11.147 12-15.808 0-6.792-8.875-8.306-12-2.944z"/></svg>';
                        heart.classList.add('heart');
                        heart.style.left = Math.random() * 100 + 'vw';
                        heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
                        container.appendChild(heart);
                        
                        // Remover depois da animação
                        setTimeout(() => heart.remove(), 5000);
                    }, i * 200);
                }
            }
        });
    </script>
</body>
</html>
